<script>
async function getSymbols(){
    const res = await fetch('symbols.txt');
    const text = await res.text();
    return text.split('\n').map(s => s.trim()).filter(s => s);
}

async function fetchData(symbol){
    const proxy = "https://api.allorigins.win/raw?url=";
    const url = proxy + encodeURIComponent(
        `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=15m&range=1d`
    );

    const res = await fetch(url);
    const data = await res.json();

    // ✅ SAFE CHECK (IMPORTANT)
    if (!data.chart || !data.chart.result) {
        throw new Error("No data");
    }

    const result = data.chart.result[0];

    return {
        t: result.timestamp.map(x => new Date(x * 1000)),
        o: result.indicators.quote[0].open,
        h: result.indicators.quote[0].high,
        l: result.indicators.quote[0].low,
        c: result.indicators.quote[0].close
    };
}

// ✅ SMALL DELAY FUNCTION (AVOID RATE LIMIT)
function delay(ms){
    return new Promise(res => setTimeout(res, ms));
}

async function loadCharts(){
    const symbols = await getSymbols();
    const container = document.getElementById("charts");
    container.innerHTML = "";

    // ✅ PROCESS IN BATCHES (VERY IMPORTANT)
    for (let i = 0; i < symbols.length; i++) {
        const sym = symbols[i];

        const div = document.createElement("div");
        div.className = "card";
        const chartDiv = document.createElement("div");
        div.appendChild(chartDiv);
        container.appendChild(div);

        try{
            const d = await fetchData(sym);

            const firstHigh = d.h[0];
            const firstLow = d.l[0];

            const trace = {
                x: d.t,
                open: d.o,
                high: d.h,
                low: d.l,
                close: d.c,
                type: 'candlestick'
            };

            const layout = {
                title: sym,
                margin:{t:30},
                shapes: [
                    {
                        type:'line',
                        x0:d.t[0],
                        x1:d.t[d.t.length-1],
                        y0:firstHigh,
                        y1:firstHigh,
                        line:{dash:'dash'}
                    },
                    {
                        type:'line',
                        x0:d.t[0],
                        x1:d.t[d.t.length-1],
                        y0:firstLow,
                        y1:firstLow,
                        line:{dash:'dash'}
                    }
                ]
            };

            Plotly.newPlot(chartDiv, [trace], layout, {responsive:true});

        }catch(e){
            chartDiv.innerHTML = "❌ Error loading " + sym;
        }

        // ✅ ADD DELAY (CRITICAL FIX)
        await delay(400);   // adjust 300–700ms if needed
    }
}

loadCharts();
</script>
