<script>
async function getSymbols(){
    const res = await fetch('symbols.txt');
    const text = await res.text();
    return text.split('\n').map(s => s.trim()).filter(s => s);
}

// ✅ safer fetch
async function fetchData(symbol){
    try{
        const proxy = "https://api.allorigins.win/raw?url=";
        const url = proxy + encodeURIComponent(
            `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=15m&range=1d`
        );

        const res = await fetch(url);
        const data = await res.json();

        if(!data.chart || !data.chart.result) throw "No data";

        const result = data.chart.result[0];

        if(!result.timestamp) throw "No candles";

        const t = result.timestamp.map(x => new Date(x*1000));
        const q = result.indicators.quote[0];

        return {
            t,
            o: q.open,
            h: q.high,
            l: q.low,
            c: q.close
        };

    }catch(err){
        throw symbol + " failed";
    }
}

// ✅ small delay (important)
function delay(ms){
    return new Promise(res => setTimeout(res, ms));
}

async function loadCharts(){
    const symbols = await getSymbols();
    const container = document.getElementById("charts");
    container.innerHTML = "";

    // ✅ create all cards first
    const chartMap = {};

    symbols.forEach(sym => {
        const div = document.createElement("div");
        div.className = "card";

        const chartDiv = document.createElement("div");
        chartDiv.innerHTML = "Loading " + sym + "...";

        div.appendChild(chartDiv);
        container.appendChild(div);

        chartMap[sym] = chartDiv;
    });

    // ✅ parallel + controlled calls
    const promises = symbols.map(async (sym, i) => {
        await delay(i * 200); // 🔥 avoids rate limit

        try{
            const d = await fetchData(sym);

            if(!d || d.t.length === 0) throw "Empty";

            const firstHigh = d.h[0];
            const firstLow  = d.l[0];

            const trace = {
                x: d.t,
                open: d.o,
                high: d.h,
                low: d.l,
                close: d.c,
                type: 'candlestick'
            };

            const layout = {
                title: sym,
                margin:{t:30},
                shapes: [
                    {
                        type:'line',
                        x0:d.t[0],
                        x1:d.t[d.t.length-1],
                        y0:firstHigh,
                        y1:firstHigh,
                        line:{dash:'dash', color:'red'}
                    },
                    {
                        type:'line',
                        x0:d.t[0],
                        x1:d.t[d.t.length-1],
                        y0:firstLow,
                        y1:firstLow,
                        line:{dash:'dash', color:'green'}
                    }
                ]
            };

            Plotly.newPlot(chartMap[sym], [trace], layout);

        }catch(e){
            chartMap[sym].innerHTML = "❌ Error loading " + sym;
        }
    });

    await Promise.allSettled(promises);
}

loadCharts();
</script>
