<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intraday Charts</title>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<style>
body { font-family: Arial; background:#f5f5f5; margin:0; }
.container { padding:20px; }
.grid { display:grid; grid-template-columns: repeat(2, 1fr); gap:20px; }
.card { background:white; padding:10px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.1);} 
input { padding:8px; width:300px; margin-bottom:15px; }
button { padding:8px 12px; cursor:pointer; }
</style>
</head>
<body>
<div class="container">
<h2>📊 Intraday Stock Charts</h2>

<input id="symbols" value="KAYNES.NS,360ONE.NS,ABB.NS" />
<button onclick="loadCharts()">Load Charts</button>

<div class="grid" id="charts"></div>
</div>

<script>
async function fetchData(symbol){
    // Using CORS proxy to bypass Yahoo blocking
    const proxy = "https://api.allorigins.win/raw?url=";
    const url = proxy + encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=15m&range=1d`);
    const res = await fetch(url);
    const data = await res.json();

    const result = data.chart.result[0];
    const t = result.timestamp.map(x => new Date(x*1000));
    const o = result.indicators.quote[0].open;
    const h = result.indicators.quote[0].high;
    const l = result.indicators.quote[0].low;
    const c = result.indicators.quote[0].close;

    return {t,o,h,l,c};
}

async function loadCharts(){
    const symbols = document.getElementById("symbols").value.split(",");
    const container = document.getElementById("charts");
    container.innerHTML = "";

    for(let sym of symbols){
        sym = sym.trim();
        const div = document.createElement("div");
        div.className = "card";
        const chartDiv = document.createElement("div");
        div.appendChild(chartDiv);
        container.appendChild(div);

        try{
            const d = await fetchData(sym);

            const firstHigh = d.h[0];
            const firstLow = d.l[0];

            const trace = {
                x: d.t,
                open: d.o,
                high: d.h,
                low: d.l,
                close: d.c,
                type: 'candlestick'
            };

            const layout = {
                title: sym,
                shapes: [
                    {type:'line', x0:d.t[0], x1:d.t[d.t.length-1], y0:firstHigh, y1:firstHigh, line:{dash:'dash'}},
                    {type:'line', x0:d.t[0], x1:d.t[d.t.length-1], y0:firstLow, y1:firstLow, line:{dash:'dash'}}
                ]
            };

            Plotly.newPlot(chartDiv, [trace], layout);
        }catch(e){
            chartDiv.innerHTML = "❌ Error loading " + sym;
        }
    }
}

loadCharts();
</script>
</body>
</html>
